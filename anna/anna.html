<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css.css">
    <title>Szeretsz?</title>
</head>
<body>
    <div class="main">
        <!--bal kép-->
        <div class="kbox">
            <div><img src="anna2.jpg" class="k" style="width: 60%; height: 50%; float: left;"></div>
            <div><img src="anna4.jpg" class="k" style="width: 70%; height: 50%; float: left;"></div>
        </div>
        <!--cím,kérdés,dátum-->
        <div class="center">
            <h1>Szeretsz engem?</h1>
            <button onclick="igen()">Igen</button> 
            <button id="movingbutton">Nem</button>
            <p id="v1"></p>
            <div id="v"></div>
            <br>
            <h1>❤ Boldog 11. hónapfordulót Hercegnőm! ❤</h1>
        </div>
        <!--jobb kép-->
        <div class="kbox">
            <div><img src="anna1.jpg" class="k" style="width: 60%; height: 50%; float: right;"></div>
            <div><img src="anna3.jpg" class="k" style="width: 70%; height: 50%; float: right;"></div>
        </div>
    </div>

    <script>
        function igen(){
            document.getElementById("v1").innerHTML = "❤Én is nagyon!❤";
            var x = document.createElement("IMG");
            x.setAttribute("src", "cica.jpg");
            x.setAttribute("width", "50%");
            x.setAttribute("height", "50%");
            document.getElementById("v").appendChild(x);
        }

        var b = document.querySelector("#movingbutton");
        b.addEventListener("mousemove",change);

        function change()
        {
        let l = Math.floor(Math.random()*500)+1;
        let t = Math.floor(Math.random()*500)+1;
        console.log('here' , l ,t , b.style.left , b.style.top);
            b.style.left = l+'px';
            b.style.top = t + "px";
        }
    </script>
</body>
</html>
